site_name: AI & Writing Wiki (Python)
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - search.highlight

nav:
  - 소개: index.md
  - 개발자 AI 전략: dev-ai.md
  - 글쓰기 AI 전략: writing-ai.md
  - AI 샘플 실험실: ai-sample.md

markdown_extensions:
  - attr_list
  - md_in_html
